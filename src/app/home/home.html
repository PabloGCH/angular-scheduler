<div class="h-screen flex flex-col overflow-hidden bg-secondary-50">
  <app-topbar></app-topbar>

  <main class="flex-1 flex flex-col p-4 sm:p-6 overflow-hidden">
    @if (userType() === 'provider') {
      <div class="flex items-center justify-between mb-4 bg-white p-2 rounded-lg border border-secondary-200 shadow-sm relative">
        <div class="flex-none w-30 sm:w-34">
          <button
            (click)="previousWeek()"
            class="text-secondary-600 hover:text-primary-600 font-medium text-sm flex items-center cursor-pointer transition-colors"
          >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            <span class="hidden sm:inline">Previous week</span>
            <span class="sm:hidden">Prev</span>
          </button>
        </div>

        <div class="flex-1 flex items-center justify-center md:justify-start gap-2 sm:gap-4 px-4 overflow-hidden">
          <!-- Desktop Actions -->
          <div class="hidden md:flex items-center gap-2">
            <button
              (click)="makeAppointment()"
              class="bg-primary-600 text-white px-4 py-1.5 rounded-md text-sm font-medium hover:bg-primary-700 transition-colors cursor-pointer whitespace-nowrap"
            >
              Make appointment
            </button>
            <button
              (click)="giveAppointment()"
              class="bg-primary-600 text-white px-4 py-1.5 rounded-md text-sm font-medium hover:bg-primary-700 transition-colors cursor-pointer whitespace-nowrap"
            >
              Give appointment
            </button>
            <button
              (click)="configure()"
              class="bg-primary-600 text-white px-4 py-1.5 rounded-md text-sm font-medium hover:bg-primary-700 transition-colors cursor-pointer whitespace-nowrap"
            >
              Configure
            </button>
          </div>

          <!-- Mobile Burger Menu -->
          <div class="md:hidden">
            <button
              (click)="toggleMenu()"
              class="p-2 text-secondary-600 hover:bg-secondary-50 rounded-md cursor-pointer transition-colors"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>

            @if (menuOpen()) {
              <div class="absolute top-full left-0 right-0 mt-1 bg-white border border-secondary-200 shadow-lg rounded-lg z-50 p-2 flex flex-col gap-1">
                <button (click)="makeAppointment()" class="text-left px-4 py-2 text-sm text-secondary-700 hover:bg-secondary-50 rounded cursor-pointer">Make appointment</button>
                <button (click)="giveAppointment()" class="text-left px-4 py-2 text-sm text-secondary-700 hover:bg-secondary-50 rounded cursor-pointer">Give appointment</button>
                <button (click)="configure()" class="text-left px-4 py-2 text-sm text-secondary-700 hover:bg-secondary-50 rounded cursor-pointer">Configure</button>
              </div>
            }
          </div>
        </div>

        <div class="flex-none w-30 sm:w-34 flex justify-end">
          <button
            (click)="nextWeek()"
            class="text-secondary-600 hover:text-primary-600 font-medium text-sm flex items-center cursor-pointer transition-colors"
          >
            <span class="hidden sm:inline">Next week</span>
            <span class="sm:hidden">Next</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Appointments Grid -->
      <div class="flex-1 overflow-hidden">
        <app-appointments-grid
          [appointments]="appointments()"
          [loading]="loading()"
          [currentWeekStart]="currentWeekStart()"
          class="h-full"
        ></app-appointments-grid>
      </div>
    } @else {
      <div class="max-w-7xl mx-auto w-full">
        <h1 class="text-3xl font-bold text-secondary-900 mb-6">Welcome, Consumer</h1>
        <div class="bg-white p-6 rounded-lg shadow-sm border border-secondary-200">
          <p class="text-secondary-600">This is your consumer dashboard. Book your next appointment here.</p>
        </div>
      </div>
    }
  </main>

  <!-- Give Appointment Popup -->
  @if (showGivePopup()) {
    <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
      <div class="bg-white rounded-xl shadow-2xl max-w-md w-full overflow-hidden">
        <div class="p-6">
          <h3 class="text-lg font-bold text-secondary-900 mb-2">Share Appointment Link</h3>
          <p class="text-sm text-secondary-600 mb-4">Send this link to someone so they can choose an appointment slot.</p>

          <div class="bg-secondary-50 border border-secondary-200 rounded-lg p-3 mb-6 break-all font-mono text-xs text-primary-700 select-all relative group">
            {{ giveUrl() }}
            <button
              (click)="copyToClipboard()"
              class="absolute right-2 top-2 p-1.5 bg-white border border-secondary-200 rounded-md text-secondary-500 hover:text-primary-600 hover:border-primary-300 transition-all shadow-sm"
              title="Copy to clipboard"
            >
              @if (copySuccess()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
              }
            </button>
          </div>

          <div class="flex justify-end">
            <button
              (click)="closeGivePopup()"
              class="bg-primary-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-primary-700 transition-colors shadow-sm"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
  }
</div>
