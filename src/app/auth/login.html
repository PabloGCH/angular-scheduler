<div class="min-h-screen bg-secondary-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-secondary-900">
      Sign in to your account
    </h2>
    <p class="mt-2 text-center text-sm text-secondary-600">
      Or
      <a href="#" class="font-medium text-primary-600 hover:text-primary-500">
        create a new account
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-secondary-100 py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-secondary-200">
      @if (errorMessage()) {
        <div class="mb-4 p-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded text-center">
          {{ errorMessage() }}
        </div>
      }
      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <app-input-email [control]="loginForm.controls.email" class="pe-1"/>

        <app-input-password [control]="loginForm.controls.password" class="pe-1"/>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="remember-me"
              name="remember-me"
              type="checkbox"
              class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-secondary-300 rounded"
              [disabled]="loading()"
            />
            <label for="remember-me" class="ml-2 block text-sm text-secondary-900">
              Remember me
            </label>
          </div>

          <div class="text-sm">
            <a href="#" class="font-medium text-primary-600 hover:text-primary-500">
              Forgot your password?
            </a>
          </div>
        </div>

        <div>
          <app-button type="submit" [disabled]="loginForm.invalid" [loading]="loading()"> Sign in </app-button>
        </div>
      </form>
    </div>
  </div>
</div>
